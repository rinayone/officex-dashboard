<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OfficeX - Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans JP', 'Lato', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #e8edf5 0%, #dce4f0 50%, #f0e8f0 100%);
  }
  .login-card {
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.7);
    border-radius: 16px;
    backdrop-filter: blur(20px);
    padding: 48px 40px;
    width: 400px;
    text-align: center;
    box-shadow: 0 0 40px rgba(177,197,212,0.3);
  }
  .login-title {
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: #0a1a3c;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .login-subtitle {
    font-size: 14px;
    color: #0a1a3c;
    opacity: 0.6;
    margin-bottom: 32px;
  }
  .input-group {
    margin-bottom: 24px;
    text-align: left;
  }
  .input-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #0a1a3c;
    margin-bottom: 8px;
    opacity: 0.7;
  }
  .input-group input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid rgba(255,255,255,0.7);
    border-radius: 10px;
    background: rgba(255,255,255,0.5);
    font-family: 'Lato', sans-serif;
    font-size: 16px;
    color: #0a1a3c;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus {
    border-color: #00a4ff;
    box-shadow: 0 0 0 3px rgba(0,164,255,0.1);
  }
  .login-btn {
    width: 100%;
    padding: 14px;
    background: #0a1a3c;
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    font-size: 15px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .login-btn:hover { opacity: 0.85; }
  .error-msg {
    color: #ff007f;
    font-size: 13px;
    margin-top: 16px;
    display: none;
  }
</style>
</head>
<body>
  <div class="login-card">
    <div class="login-title">OfficeX</div>
    <div class="login-subtitle">Dashboard Access</div>
    <form id="loginForm">
      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" autofocus>
      </div>
      <button type="submit" class="login-btn">Login</button>
      <div class="error-msg" id="error">パスワードが正しくありません</div>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const pw = document.getElementById('password').value;
      const encoded = new TextEncoder().encode(pw);
      const hashBuffer = await crypto.subtle.digest('SHA-256', encoded);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      const url = hash + '.html';
      try {
        const res = await fetch(url, { method: 'HEAD' });
        if (res.ok) {
          window.location.href = url;
        } else {
          document.getElementById('error').style.display = 'block';
        }
      } catch {
        document.getElementById('error').style.display = 'block';
      }
    });
  </script>
</body>
</html>
